<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobFill</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #6ee7b7;
      --accent-dim: #6ee7b722;
      --text: #e8e8ed;
      --muted: #6b6b7a;
      --danger: #f87171;
      --success: #6ee7b7;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 16px;
      height: 16px;
      fill: #0f0f11;
    }

    .logo-text {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
    }

    .settings-btn:hover {
      color: var(--text);
      background: var(--surface);
    }

    .body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.filling { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; animation: pulse 1s infinite; }
    .status-dot.error { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .status-text strong {
      color: var(--text);
      font-weight: 500;
    }

    .fill-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0f0f11;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .fill-btn:hover { opacity: 0.9; }
    .fill-btn:active { transform: scale(0.98); }
    .fill-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .profile-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .profile-check svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .profile-check.ok { color: var(--accent); }
    .profile-check.warn { color: var(--danger); }

    .open-profile-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .open-profile-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .footer {
      padding: 10px 20px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <span class="logo-text">JobFill</span>
    </div>
    <button class="settings-btn" id="openProfileBtn" title="Edit profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Checking page...</div>
    </div>

    <div class="profile-check" id="profileCheck">
      <!-- populated by JS -->
    </div>

    <button class="fill-btn" id="fillBtn" disabled>Fill Form</button>
    <button class="open-profile-btn" id="openProfileBtnBottom">Manage Profile →</button>
  </div>

  <div class="footer">jobfill v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
